version: 2

project_name: metorial

dist: dist

release:
  github:
    owner: metorial
    name: cli
  draft: false
  replace_existing_draft: true

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: metorial
    main: ./cmd/metorial
    binary: metorial
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/metorial/cli/internal/version.Version={{ .Version }}
      - -X github.com/metorial/cli/internal/version.Commit={{ .Commit }}
      - -X github.com/metorial/cli/internal/version.Date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - metorial
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - name: metorial
    repository:
      owner: metorial
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: https://metorial.com
    description: Official CLI for the Metorial platform
    license: MIT
    skip_upload: '{{ eq .Env.HOMEBREW_TAP_GITHUB_TOKEN "" }}'
    commit_author:
      name: metorial-bot
      email: hey@metorial.com
    test: |
      system "#{bin}/metorial", "version"
    install: |
      bin.install "metorial"

scoops:
  - name: metorial
    repository:
      owner: metorial
      name: scoop-bucket
      token: '{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}'
    homepage: https://metorial.com
    description: Official CLI for the Metorial platform
    license: MIT
    skip_upload: '{{ eq .Env.SCOOP_BUCKET_GITHUB_TOKEN "" }}'
    commit_author:
      name: metorial-bot
      email: hey@metorial.com

chocolateys:
  - name: metorial
    title: Metorial CLI
    authors: Metorial Inc.
    project_url: https://metorial.com
    url_template: 'https://github.com/metorial/cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}'
    copyright: 2026 Metorial Inc.
    license_url: https://github.com/metorial/cli/blob/main/LICENSE
    project_source_url: https://github.com/metorial/cli
    docs_url: https://metorial.com/docs
    bug_tracker_url: https://github.com/metorial/cli/issues
    release_notes: https://github.com/metorial/cli/releases/tag/{{ .Tag }}
    summary: Official CLI for the Metorial platform
    description: The Metorial CLI lets you authenticate, inspect resources, and work with the Metorial platform from your terminal.
    tags: metorial cli ai mcp
    api_key: '{{ .Env.CHOCOLATEY_API_KEY }}'
    source_repo: https://push.chocolatey.org/
    skip_publish: '{{ eq .Env.CHOCOLATEY_API_KEY "" }}'

changelog:
  sort: asc
  use: git

name: '[RELEASE] Metorial CLI'

on:
  push:
    tags:
      - 'v*'

jobs:
  release-cli:
    name: 'Release Metorial CLI'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: 'metorial-cli'
      GITHUB_TOKEN: ${{ github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
      GITHUB_REPOSITORY_OWNER: metorial
      GITHUB_REPOSITORY_NAME: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install npm workspace dependencies
        run: bun install --frozen-lockfile

      - name: Resolve GoReleaser skip flags
        shell: bash
        run: |
          skips=()

          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            skips+=(homebrew scoop chocolatey)
          fi

          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]]; then
            skips+=(homebrew)
          fi

          if [[ -z "${SCOOP_BUCKET_GITHUB_TOKEN}" ]]; then
            skips+=(scoop)
          fi

          if [[ -z "${CHOCOLATEY_API_KEY}" ]]; then
            skips+=(chocolatey)
          fi

          if [[ ${#skips[@]} -gt 0 ]]; then
            unique_skips="$(printf '%s\n' "${skips[@]}" | awk '!seen[$0]++' | paste -sd, -)"
            echo "GORELEASER_SKIP_ARGS=--skip=${unique_skips}" >> "$GITHUB_ENV"
          else
            echo "GORELEASER_SKIP_ARGS=" >> "$GITHUB_ENV"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean ${{ env.GORELEASER_SKIP_ARGS }}

      - name: Set npm package versions
        run: bun run set-npm-version -- "${GITHUB_REF_NAME#v}"

      - name: Build npm packages
        run: bun run build:npm

      - name: Publish npm packages
        run: bun run publish:npm

      - name: Build hosted installer site
        run: bun ./scripts/build-public.ts

      - name: Upload installer site artifact
        uses: actions/upload-artifact@v4
        with:
          name: metorial-cli-public
          path: public

      - name: Deploy installer site to Cloudflare Pages
        run: bunx wrangler@latest pages deploy ./public --project-name "${CLOUDFLARE_PAGES_PROJECT}" --branch main

name: '[RELEASE] Metorial CLI'

on:
  push:
    tags:
      - 'v*'

jobs:
  release-cli:
    name: 'Release Metorial CLI'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_CLI_PAGES_PROJECT != '' && secrets.CLOUDFLARE_CLI_PAGES_PROJECT || 'metorial-cli' }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN != '' && secrets.GH_TOKEN || github.token }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
      CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
      GITHUB_REPOSITORY_OWNER: metorial
      GITHUB_REPOSITORY_NAME: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN != '' && secrets.GH_TOKEN || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean

      - name: Build hosted installer site
        run: bun ./scripts/build-public.ts

      - name: Upload installer site artifact
        uses: actions/upload-artifact@v4
        with:
          name: metorial-cli-public
          path: public

      - name: Deploy installer site to Cloudflare Pages
        run: bunx wrangler@latest pages deploy ./public --project-name "${CLOUDFLARE_PAGES_PROJECT}" --branch main
